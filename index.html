<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dalecote House — Volunteer Tasks</title>
<style>
  :root {
    --green-dark:  #1e5c30;
    --green-mid:   #2d7a45;
    --green-light: #e8f5ec;
    --green-row:   #f2faf4;
    --amber:       #b86000;
    --red:         #c0180c;
    --text:        #1a1a1a;
    --muted:       #666;
    --white:       #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--green-light);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--green-dark);
    color: var(--white);
    padding: 1.1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  #updated {
    font-size: 0.85rem;
    opacity: 0.75;
    text-align: right;
    line-height: 1.5;
  }

  /* ── Main ── */
  main {
    flex: 1;
    padding: 1.5rem 2rem;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── Status bar ── */
  #status-bar {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
    min-height: 1.2rem;
  }

  /* ── Task cards ── */
  #task-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .task-card {
    background: var(--white);
    border-radius: 10px;
    border-left: 6px solid var(--green-mid);
    padding: 1rem 1.25rem;
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .task-card.overdue  { border-left-color: var(--red); }
  .task-card.today    { border-left-color: var(--amber); }
  .task-card.soon     { border-left-color: var(--amber); }
  .task-card.unset    { border-left-color: #aaa; }

  .task-icon {
    font-size: 2.2rem;
    text-align: center;
    line-height: 1;
  }

  .task-body {}
  .task-label {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.2rem;
  }
  .task-notes {
    font-size: 0.88rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .task-when {
    text-align: right;
    font-size: 1rem;
    font-weight: 700;
    white-space: nowrap;
    min-width: 130px;
  }
  .task-when.overdue { color: var(--red); }
  .task-when.today   { color: var(--amber); }
  .task-when.soon    { color: var(--green-mid); }
  .task-when.unset   { color: var(--muted); font-weight: 400; font-style: italic; }

  /* ── All clear ── */
  #all-clear {
    display: none;
    background: var(--white);
    border-radius: 10px;
    padding: 2.5rem;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  #all-clear .tick { font-size: 3rem; margin-bottom: 0.75rem; }
  #all-clear p { font-size: 1.4rem; color: var(--green-dark); font-weight: 600; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 0.75rem;
    font-size: 0.75rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  /* ── Full-screen kiosk mode ── */
  @media (min-height: 800px) {
    body { font-size: 18px; }
    header h1 { font-size: 2.4rem; }
    .task-label { font-size: 1.5rem; }
    .task-when  { font-size: 1.2rem; }
    .task-icon  { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🏛 Dalecote House — Volunteer Tasks</h1>
  <div id="updated">Loading…</div>
</header>

<main>
  <div id="status-bar"></div>
  <div id="task-list"></div>
  <div id="all-clear">
    <div class="tick">✅</div>
    <p>Nothing due right now — thank you volunteers!</p>
  </div>
</main>

<footer>
  Refreshes automatically every 5 minutes · Please speak to the manager if you have questions
</footer>

<script>
// ── Configuration ──────────────────────────────────────────
// Replace with your actual GAS deployment URL
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx7Yw6rlSG2tSTkNxR4VQXPQEn70y4hd8BbNz4PoiSng1bbSZPhnNn4VaDtwqZgaIK9Ug/exec';

const DAYS_AHEAD = 7; // show tasks due within this many days

// ── Date helpers ───────────────────────────────────────────
function today() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function daysDiff(dueDateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const due = new Date(dueDateStr + 'T00:00:00');
  return Math.round((due - now) / 86400000);
}

function ordinal(n) {
  if (n >= 11 && n <= 13) return n + 'th';
  return n + ({1:'st',2:'nd',3:'rd'}[n%10] || 'th');
}

function fmtDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
}

function nowStr() {
  const d = new Date();
  return d.toLocaleDateString('en-GB', {
    weekday:'long', day:'numeric', month:'long', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
}

// ── Render ─────────────────────────────────────────────────
function render(tasks, dataUpdatedAt) {
  const list     = document.getElementById('task-list');
  const allClear = document.getElementById('all-clear');
  const updated  = document.getElementById('updated');
  const status   = document.getElementById('status-bar');

  const todayStr = today();
  const cutoff   = new Date(); cutoff.setHours(0,0,0,0);
  cutoff.setDate(cutoff.getDate() + DAYS_AHEAD);

  // Filter: overdue, due today, due within DAYS_AHEAD, or no date set
  const filtered = tasks.filter(t => {
    if (!t.nextDue) return true; // unset — always show
    const diff = daysDiff(t.nextDue);
    return diff <= DAYS_AHEAD;
  });

  // Sort: overdue first, then by date, unset last
  filtered.sort((a, b) => {
    if (!a.nextDue && !b.nextDue) return 0;
    if (!a.nextDue) return 1;
    if (!b.nextDue) return -1;
    return a.nextDue.localeCompare(b.nextDue);
  });

  updated.innerHTML = `Page updated: ${nowStr()}<br>
    Data synced: ${dataUpdatedAt ? new Date(dataUpdatedAt).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'}`;

  list.innerHTML = '';

  if (filtered.length === 0) {
    allClear.style.display = 'block';
    status.textContent = 'All volunteer tasks are up to date.';
    return;
  }

  allClear.style.display = 'none';
  status.textContent = `${filtered.length} task${filtered.length !== 1 ? 's' : ''} shown`;

  filtered.forEach(t => {
    let urgency, whenText;
    if (!t.nextDue) {
      urgency  = 'unset';
      whenText = 'No date set';
    } else {
      const diff = daysDiff(t.nextDue);
      if (diff < 0) {
        urgency  = 'overdue';
        whenText = `Overdue by ${Math.abs(diff)} day${Math.abs(diff)!==1?'s':''}`;
      } else if (diff === 0) {
        urgency  = 'today';
        whenText = 'Due today';
      } else {
        urgency  = 'soon';
        whenText = `Due ${fmtDate(t.nextDue)}`;
      }
    }

    const card = document.createElement('div');
    card.className = `task-card ${urgency}`;
    card.innerHTML = `
      <div class="task-icon">${t.icon || '📋'}</div>
      <div class="task-body">
        <div class="task-label">${escHtml(t.label)}</div>
        ${t.notes ? `<div class="task-notes">${escHtml(t.notes)}</div>` : ''}
      </div>
      <div class="task-when ${urgency}">${whenText}</div>
    `;
    list.appendChild(card);
  });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Fetch from GAS ─────────────────────────────────────────
function fetchTasks() {
  document.getElementById('status-bar').textContent = 'Refreshing…';
  const cbName = 'wpwVolCb' + Date.now();
  const tag    = document.createElement('script');
  const tid    = setTimeout(() => {
    tag.remove();
    document.getElementById('status-bar').textContent = 'Could not reach server — will retry.';
  }, 15000);

  window[cbName] = function(data) {
    clearTimeout(tid);
    tag.remove();
    delete window[cbName];
    if (data.ok) {
      render(data.tasks || [], data.updatedAt);
    } else {
      document.getElementById('status-bar').textContent = 'Error: ' + (data.error || 'unknown');
    }
  };

  tag.src = `${GAS_URL}?action=volunteerTasksFetch&callback=${cbName}`;
  document.head.appendChild(tag);
}

// ── Auto-refresh every 5 minutes ───────────────────────────
fetchTasks();
setInterval(fetchTasks, 5 * 60 * 1000);
</script>
</body>
</html>
